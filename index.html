<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Coffee | Premium Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Aura<span>Coffee</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search coffee, beans, or snacks...">
            <i class="fas fa-search"></i>
        </div>
        <div class="nav-icons">
            <div class="cart-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Premium Roasts <br> Delivered.</h1>
            <p>By Emaan Zahid | University of Gujrat Excellence</p>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <ul class="filter-list">
                <li class="active" onclick="filterItems('all', this)">All Items</li>
                <li onclick="filterItems('Hot Coffee', this)">Hot Coffee</li>
                <li onclick="filterItems('Cold Brew', this)">Cold Brew</li>
                <li onclick="filterItems('Coffee Beans', this)">Whole Beans</li>
            </ul>
        </aside>

        <main class="products-section">
            <div class="grid" id="productGrid"></div>
        </main>
    </div>

    <section class="map-container">
        <h2 style="text-align: center; margin-bottom: 20px; font-weight: 700;">Visit Our Roastery</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d54403.41160161492!2d74.05389659999999!3d32.61092195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x391f03f75073045d%3A0x6966fa04b6848777!2sJalalpur%20Jattan%2C%20Gujrat%2C%20Punjab!5e0!3m2!1sen!2spk!4v1700000000000" width="100%" height="350" style="border:0; border-radius: 20px;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
        </div>
        <div id="cartItems" class="cart-items-body"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="totalPrice">$0.00</span>
            </div>
            <button class="order-btn" onclick="placeOrder()">Confirm Order</button>
        </div>
    </div>

    <div id="toast" class="toast">Added to cart!</div>

    <script src="script.js"></script>
</body>
</html>
